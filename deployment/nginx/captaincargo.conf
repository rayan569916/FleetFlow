# HTTP → HTTPS redirect
server {
    listen 80;
    server_name app.captaincargo.co;

    return 301 https://app.captaincargo.co$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name app.captaincargo.co;

    root /var/www/frontend;
    index index.html;

    # SSL certificates
    ssl_certificate     /etc/letsencrypt/live/app.captaincargo.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.captaincargo.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # MIME types (VERY IMPORTANT)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    types {
        application/manifest+json webmanifest;
    }

    # API proxy
    location /api {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Service worker — no caching
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Static icons
    location /icons/ {
        root /var/www/frontend;
    }

    # Angular SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
