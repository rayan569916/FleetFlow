<section id="reportSection" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 mb-6">

  <!-- Tracking -->
  <app-card
    extraClass="hover:shadow-md hover:border-slate-300 cursor-pointer flex flex-col items-center justify-center text-center py-6"
    (click)="navigateToTracking()"
  >
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-50 text-blue-600">
      <!-- Search / Tracking Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>
    <span class="font-semibold text-slate-700">Tracking</span>
  </app-card>

  <!-- Shipments -->
  <app-card
    extraClass="hover:shadow-md hover:border-slate-300 cursor-pointer flex flex-col items-center justify-center text-center py-6"
    (click)="navigateToShipments()"
  >
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-green-50 text-green-600">
      <!-- Package Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.3 7 12 12 20.7 7"/>
        <line x1="12" y1="22" x2="12" y2="12"/>
      </svg>
    </div>
    <span class="font-semibold text-slate-700">Shipments</span>
  </app-card>

  <!-- Shipment Groups -->
  <app-card
    extraClass="hover:shadow-md hover:border-slate-300 cursor-pointer flex flex-col items-center justify-center text-center py-6"
    (click)="navigateToShipmentGroups()"
  >
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-indigo-50 text-indigo-600">
      <!-- Layers / Group Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
    </div>
    <span class="font-semibold text-slate-700">Loading List</span>
  </app-card>

  <!-- Drivers -->
  <app-card
    (click)="navigateToDriver()"
    extraClass="hover:shadow-md hover:border-slate-300 cursor-pointer flex flex-col items-center justify-center text-center py-6"
  >
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-yellow-50 text-yellow-600">
      <!-- Driver / User Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="7" r="4"/>
        <path d="M5.5 21a6.5 6.5 0 0 1 13 0"/>
      </svg>
    </div>
    <span class="font-semibold text-slate-700">Driver</span>
  </app-card>

  <!-- Live Tracking -->
  <app-card
    extraClass="hover:shadow-md hover:border-slate-300 cursor-pointer flex flex-col items-center justify-center text-center py-6"
    (click)="navigateToLiveTracking()"
  >
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-red-50 text-red-600">
      <!-- Map / Live Location Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none"
        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4z"/>
        <line x1="8" y1="2" x2="8" y2="18"/>
        <line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
    </div>
    <span class="font-semibold text-slate-700">Live Tracking</span>
  </app-card>

</section>

<router-outlet></router-outlet>
