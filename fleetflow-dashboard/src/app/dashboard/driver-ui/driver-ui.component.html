<div class="min-h-screen bg-[var(--brand-purple-900)] flex flex-col items-center justify-center p-4 pb-16">
  <div class="w-full max-w-md space-y-6">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-[var(--brand-yellow-500)]">Driver Portal</h1>
      <p class="text-[var(--brand-yellow-500)] mt-2">Select an option to continue</p>
    </div>

    <div class="block bg-[var(--brand-yellow-500)] rounded-2xl shadow-sm border border-gray-100 p-2">
      <app-total-cargo-card></app-total-cargo-card>
    </div>

    <!-- Invoice Card -->
    <a routerLink="/dashboard/invoice" class="block">
      <div
        class="bg-[var(--brand-yellow-500)] rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4 active:scale-[0.98] transition-transform hover:shadow-md cursor-pointer"
      >
        <div class="bg-blue-100 text-blue-600 p-4 rounded-full flex-shrink-0">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
        </div>
        <div class="flex-1">
          <h2 class="text-xl font-semibold text-gray-800">New Invoice</h2>
          <p class="text-sm text-gray-500 mt-1">Create and manage shipment invoices</p>
        </div>
        <div class="text-gray-400">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </div>
      </div>
    </a>

    <!-- Balance Share Card -->
    <a routerLink="/dashboard/balance-share" class="block">
      <div
        class="bg-[var(--brand-yellow-500)] rounded-2xl shadow-sm border border-gray-100 p-6 flex items-center space-x-4 active:scale-[0.98] transition-transform hover:shadow-md cursor-pointer"
      >
        <div class="bg-green-100 text-green-600 p-4 rounded-full flex-shrink-0">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
        </div>
        <div class="flex-1">
          <h2 class="text-xl font-semibold text-gray-800">Balance Share</h2>
          <p class="text-sm text-gray-500 mt-1">View and manage daily balance sharing</p>
        </div>
        <div class="text-gray-400">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
        </div>
      </div>
    </a>
  </div>
</div>
