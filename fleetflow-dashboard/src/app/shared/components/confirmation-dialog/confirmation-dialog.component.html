<div *ngIf="state()" class="dialog-backdrop" (click)="onBackdropClick($event)" @fade>
  <div class="dialog-container" @slideUp>
    <div class="dialog-header">
      <div class="header-icon">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h2>{{ state()?.title }}</h2>
    </div>

    <div class="dialog-body">
      <p>{{ state()?.message }}</p>
    </div>

    <div class="dialog-footer" [class.alert-mode]="state()?.isAlert">
      <button *ngIf="!state()?.isAlert" #cancelBtn class="btn-cancel" (click)="onCancel()">
        {{ state()?.cancelText }}
      </button>
      <button #confirmBtn class="btn-confirm" (click)="onConfirm()">
        {{ state()?.confirmText }}
      </button>
    </div>
  </div>
</div>
