<!-- Fixed Bottom Navigation Bar -->
<div
  class="fixed bottom-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-lg border-t border-[#E2E8F0]/30 shadow-[0_-10px_25px_rgba(0,0,0,0.05)] pb-safe-area md:hidden rounded-t-[2.5rem]"
>
  <div class="flex justify-around items-center h-20 px-4">
    <!-- Home (Driver UI) -->
    <a
      routerLink="/dashboard/driver-ui"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all active:scale-90"
    >
      <div [class.bg-[#6C3483]/10]="isActive('/driver-ui')" 
           [class.text-[#6C3483]]="isActive('/driver-ui')"
           [class.text-[#94A3B8]]="!isActive('/driver-ui')"
           class="p-2 rounded-xl transition-all">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          [attr.stroke-width]="isActive('/driver-ui') ? '2.5' : '2'"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
          />
        </svg>
      </div>
      <span class="text-[10px] font-black uppercase tracking-tighter transition-colors"
            [class.text-[#6C3483]]="isActive('/driver-ui')"
            [class.text-[#94A3B8]]="!isActive('/driver-ui')">Home</span>
    </a>

    <!-- Invoice -->
    <a
      routerLink="/dashboard/invoice"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all active:scale-90"
    >
      <div [class.bg-[#6C3483]/10]="isActive('/invoice')" 
           [class.text-[#6C3483]]="isActive('/invoice')"
           [class.text-[#94A3B8]]="!isActive('/invoice')"
           class="p-2 rounded-xl transition-all">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          [attr.stroke-width]="isActive('/invoice') ? '2.5' : '2'"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
          />
        </svg>
      </div>
      <span class="text-[10px] font-black uppercase tracking-tighter transition-colors"
            [class.text-[#6C3483]]="isActive('/invoice')"
            [class.text-[#94A3B8]]="!isActive('/invoice')">Invoice</span>
    </a>

    <!-- Balance Share -->
    <a
      routerLink="/dashboard/balance-share"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-all active:scale-90"
    >
      <div [class.bg-[#6C3483]/10]="isActive('/balance-share')" 
           [class.text-[#6C3483]]="isActive('/balance-share')"
           [class.text-[#94A3B8]]="!isActive('/balance-share')"
           class="p-2 rounded-xl transition-all">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          [attr.stroke-width]="isActive('/balance-share') ? '2.5' : '2'"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <span class="text-[10px] font-black uppercase tracking-tighter transition-colors"
            [class.text-[#6C3483]]="isActive('/balance-share')"
            [class.text-[#94A3B8]]="!isActive('/balance-share')">Balance</span>
    </a>
  </div>
</div>
