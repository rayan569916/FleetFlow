<!-- Fixed Bottom Navigation Bar -->
<div
  class="fixed bottom-0 left-0 right-0 z-50 bg-[var(--brand-yellow-500)] text-[var(--brand-purple-600)] border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-safe-area md:hidden"
>
  <div class="flex justify-around items-center h-16">
    <!-- Home (Driver UI) -->
    <a
      routerLink="/dashboard/driver-ui"
      [class.text-blue-600]="isActive('/driver-ui')"
      [class.text-gray-500]="!isActive('/driver-ui')"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 active:bg-gray-50 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        [attr.stroke-width]="isActive('/driver-ui') ? '2.5' : '2'"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
        />
      </svg>
      <span class="text-[10px] font-medium">Home</span>
    </a>

    <!-- Invoice -->
    <a
      routerLink="/dashboard/invoice"
      [class.text-blue-600]="isActive('/invoice')"
      [class.text-gray-500]="!isActive('/invoice')"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 active:bg-gray-50 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        [attr.stroke-width]="isActive('/invoice') ? '2.5' : '2'"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
        />
      </svg>
      <span class="text-[10px] font-medium">Invoice</span>
    </a>

    <!-- Balance Share -->
    <a
      routerLink="/dashboard/balance-share"
      [class.text-blue-600]="isActive('/balance-share')"
      [class.text-gray-500]="!isActive('/balance-share')"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 active:bg-gray-50 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        [attr.stroke-width]="isActive('/balance-share') ? '2.5' : '2'"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <span class="text-[10px] font-medium">Balance</span>
    </a>

    <!-- Go Back -->
    <!-- <button
      (click)="goBack()"
      class="flex flex-col items-center justify-center w-full h-full space-y-1 text-gray-500 active:bg-gray-50 transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span class="text-[10px] font-medium">Back</span>
    </button>
  </div> -->
</div>
