@if (!isDriver()) {
  <div
    class="min-h-screen app-shell"
    [class.sidebar-expanded]="(sidebarExpanded$ | async) ?? false"
  >
    <button
      class="mobile-overlay"
      [class.open]="(sidebarExpanded$ | async) ?? false"
      (click)="closeSidebar()"
      aria-label="Close sidebar"
    ></button>
    <app-sidebar [expanded]="(sidebarExpanded$ | async) ?? false" />

    <main class="content-shell transition-all duration-300">
      <app-header (menuClicked)="toggleSidebar()" />

      <div class="p-4 md:p-6 lg:p-8 w-full">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
} @else {
  <!-- Driver Layout: Full-screen mobile-optimized, no sidebar or header -->
  <div class="driver-layout">
    <div class="driver-header">
      <div class="flex items-center gap-2">
        <img src="captain_cargo_logo_yellow.svg" alt="Logo" class="h-10 w-auto shrink-0" />
        <span class="driver-logo">Captain Cargo</span>

        
        <div class="breadcrumb hidden md:block md:flex items-center">
          <div class="crumb-icon-wrapper mr-3">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 text-emerald-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
              />
            </svg>
          </div>
          <span class="crumb-link" routerLink="/dashboard">Home</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-3 w-3 mx-2 text-slate-500/50"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 5l7 7-7 7"
            />
          </svg>
          <span class="crumb-current">{{ currentPageTitle() }}</span>
        </div>
      </div>

      <button class="driver-logout-btn" (click)="logout()">Logout</button>
    </div>
    <div class="driver-content">
      <router-outlet></router-outlet>
    </div>
  </div>
}
