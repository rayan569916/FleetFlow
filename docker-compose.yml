services:
  # Database Service (MySQL)
  db:
    image: mysql:8.0
    container_name: captain_cargo_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-fleetflow_db}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql


  # Backend Service (Flask)
  backend:
    build: .
    container_name: captain_cargo_backend
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-fleetflow_db}
      SECRET_KEY: ${SECRET_KEY:-your_secret_key_here}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:4200","http://127.0.0.1:4200","http://localhost"]}

  # Frontend Service (Angular + Nginx)
  frontend:
    build: ./fleetflow-dashboard
    container_name: captain_cargo_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
